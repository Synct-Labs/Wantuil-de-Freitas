# Nginx para SPA Vite com proxy reverso para a API
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compressao gzip para reduzir trafego
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  # Cache agressivo para assets versionados pelo Vite (hash no nome)
  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy reverso para a API (containers se enxergam pelo nome do servico)
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 10M;
  }

  # Health check do backend (passa direto)
  location /health {
    proxy_pass http://backend:3000/health;
    proxy_http_version 1.1;
    access_log off;
  }

  # SPA: qualquer rota desconhecida cai no index.html
  # (deixa o React Router fazer o trabalho client-side)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Security headers basicos
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
