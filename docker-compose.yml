# docker-compose.yml — Sistema de Almoxarifado Wantuil
#
# Sobe 3 servicos: postgres, backend (NestJS) e frontend (Nginx servindo SPA).
# Para producao na VPS, use o arquivo docker-compose.prod.yml que adiciona
# certificados TLS via Caddy/Traefik em vez de expor o Nginx interno.
#
# Uso basico:
#   cp .env.example .env  &&  edite as variaveis
#   docker compose up -d
#   docker compose logs -f backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: wantuil-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wantuil_db}
      POSTGRES_USER: ${POSTGRES_USER:-wantuil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      TZ: America/Cuiaba
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    # Apenas exposto INTERNAMENTE (sem ports:) — backend acessa via rede docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wantuil} -d ${POSTGRES_DB:-wantuil_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wantuil-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wantuil-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-wantuil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wantuil_db}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      JWT_EXPIRES: ${JWT_EXPIRES:-8h}
      FRONTEND_URL: ${FRONTEND_URL:-https://syncontrol.cloud}
      APP_URL: ${APP_URL:-https://syncontrol.cloud}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      COSMOS_TOKEN: ${COSMOS_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: America/Cuiaba
    # Sem ports: — quem fala com o backend e o frontend (via proxy nginx interno)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health/ping"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - wantuil-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wantuil-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - wantuil-net

volumes:
  postgres_data:
    name: wantuil_postgres_data

networks:
  wantuil-net:
    driver: bridge
